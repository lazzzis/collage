<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>2-3 图横向拼接 Collage</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="title-block">
        <p class="eyebrow">2-3 张横向图片拼接</p>
        <h1>Collage 预览编辑器</h1>
        <p class="sub">上传两张横向图片，可选上传第三张，竖向拼接显示，调整边框与底部文字，即时预览拼接效果。</p>
      </header>

      <section class="layout">
        <div class="controls">
        <div class="control-card">
          <h2>边框设置</h2>
          <div class="field">
            <label>边框颜色</label>
            <input type="color" id="borderColor" value="#1f1d1b" />
          </div>
          <div class="field">
            <label>边框粗细</label>
            <input type="range" id="borderSize" min="0" max="24" value="11" />
            <span class="value" id="borderSizeValue">11 px</span>
          </div>
          <div class="field inline">
            <label>
              <input type="checkbox" id="toggleRadius" checked />
              显示圆角
            </label>
          </div>
          <div class="field inline">
            <label>
              <input type="checkbox" id="toggleInnerBorder" checked />
              图片间插入边框
            </label>
          </div>
        </div>

        <div class="control-card">
          <h2>底部文字</h2>
          <div class="field">
            <label>文字内容</label>
            <input type="text" id="caption" placeholder="例如：2026 春季画册" maxlength="64" />
          </div>
          <div class="field">
            <label>文字颜色</label>
            <input type="color" id="captionColor" value="#f8f3e9" />
          </div>
          <div class="field">
            <label>字体</label>
            <input
              type="text"
              id="captionFont"
              placeholder='例如: "Noto Sans SC", "PingFang SC", sans-serif'
              value='"Nunito", "Source Serif Pro", "Fira Sans", sans-serif'
            />
          </div>
          <div class="field">
            <label>底边加粗</label>
            <input type="range" id="bottomBorderSize" min="0" max="48" value="26" />
            <span class="value" id="bottomBorderValue">26 px</span>
          </div>
        </div>

        <div class="control-card">
          <h2>导出</h2>
          <button class="primary" id="exportButton">导出拼接图片</button>
          <p class="hint">导出前请确保前两张图片已上传，第三张为可选。</p>
        </div>
        </div>

        <div class="preview-wrap">
          <div class="preview" id="preview">
            <div class="panel" data-index="0">
              <img alt="图片 1 预览" />
              <span class="placeholder">点击上传 图片 1</span>
              <input
                class="panel-input"
                type="file"
                accept="image/*"
                data-slot="0"
                aria-label="上传图片 1"
              />
            </div>
            <div class="panel" data-index="1">
              <img alt="图片 2 预览" />
              <span class="placeholder">点击上传 图片 2</span>
              <input
                class="panel-input"
                type="file"
                accept="image/*"
                data-slot="1"
                aria-label="上传图片 2"
              />
            </div>
            <div class="panel panel-optional" data-index="2">
              <img alt="图片 3 预览" />
              <span class="placeholder">点击上传 图片 3（可选）</span>
              <input
                class="panel-input"
                type="file"
                accept="image/*"
                data-slot="2"
                aria-label="上传图片 3（可选）"
              />
            </div>
            <div class="bottom-label" id="bottomLabel"></div>
          </div>
          <button class="add-third-btn" id="addThirdBtn">+ 添加第三张图片（可选）</button>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
